<div class="tab-pane bg " id="userSetting">
						<section class="tools">
							<ul class="breadcrumb">
								<li class="title">餐厅设置</li>
								<li class="active"><a href="">员工设置</a></li>
							</ul>
							<div class="toolbar">
								<div class="btn-group">
									<a title="添加员工" ng-click="addemployee()" data-toggle="toolbar-tooltip" class="btn">
										<i class="fa fa-fw fa-user-plus"></i>添加员工
									</a>

								</div>
							</div>
						</section>
						<ul class="userList">
							<li class="heading">
								<span class="UserName">姓名</span>
								<span class="CellPhone">手机</span>
								<span class="Email">Email</span>
								<span class="UserRole">角色权限</span>
							</li>
							<li class="userItem" ng-repeat="x in employee |orderBy:['DelTag','UserRole','UserId'] track by $index"  ng-class="{'cancel':x.DelTag}">
								<span class="UserName" ng-click="editemployee(x)">{{x.UserName}}</span>
								<span class="CellPhone" ng-click="editemployee(x)">{{x.CellPhone}}</span>
								<span class="Email" ng-click="editemployee(x)">{{x.Email}}</span>
								<span class="UserRole" ng-show="!x.UserRole" ng-click="editemployee(x)">管理员</span>
								<span class="UserRole" ng-show="x.UserRole" ng-click="editemployee(x)">员工</span>
								<button  class="btn btn-info btn-xs" ng-show="x.DelTag" ng-click="enabled(x.UserId,x.DelTag)">启用</button>
								<button  class="btn btn-danger btn-xs" ng-show="!x.DelTag" ng-click="enabled(x.UserId,x.DelTag)">禁用</button>
							</li>
						</ul>
					</div>
	<div class="myModal">					
<div id="modalUserSetting" class="modal fade " tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel">
			  <div class="modal-dialog">
				<div class="modal-content">
				  <div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
					<h4 class="modal-title">{{emptitle}}</h4>
				  </div>
				  <div class="modal-body">
					<form class="form-horizontal">
					<div class="form-group row">
						<label for="inputUserNo1" class="col-sm-3 control-label">员工id</label>
						<div class="col-sm-8">
						  <input  class="form-control" disabled="true" id="inputUserNo1" placeholder="员工编号" ng-model="employeedet.UserId">
						</div>
					 </div>
					  <div class="form-group row">
						<label for="inputName1" class="col-sm-3 control-label">姓名</label>
						<div class="col-sm-8">
						  <input class="form-control" id="inputName1" placeholder="姓名" ng-model="employeedet.UserName">
						</div>
					  </div>
					   <div class="form-group row">
						<label for="inputUserCellphone1" class="col-sm-3 control-label">手机号</label>
						<div class="col-sm-8">
						  <input  type="tel" class="form-control" id="inputUserCellphone1" placeholder="手机号" ng-model="employeedet.CellPhone">
						</div>
					  </div>
					  <div class="form-group row">
						<label for="inputEmail1" class="col-sm-3 control-label">邮箱</label>
						<div class="col-sm-8">
						  <input type="email" class="form-control" id="inputEmail1" placeholder="邮箱" ng-model="employeedet.Email">
						</div>
					  </div>
					  <div class="form-group row">
					  	<label for="inputEmail1" class="col-sm-3 control-label">权限</label>
						<div class="col-sm-2">
							  <input name="user" type="radio" ng-value="1" ng-model="employeedet.UserRole"> 员工
						</div>
						<div class=" col-sm-5">
							<input name="user" type="radio"  ng-value="0" ng-model="employeedet.UserRole"> 管理员
						</div>
					  </div>
					  <div class="alert alert-warning alert-dismissible col-sm-offset-3 col-sm-7" role="alert">
						 	(管理员可修改设置, 员工不可)
						</div>
					   <div class="form-group row">
						<label for="inputPassword1" class="col-sm-3 control-label">新密码</label>
						<div class="col-sm-8">
						  <input type="password" class="form-control" id="inputPassword1" placeholder="新密码"  ng-model="employeedet.Password">
						</div>
					  </div>
					  <div class="col-sm-offset-3 col-sm-7 hidden">
						<span>绑定微信注册登录</span><i class="glyphicon glyphicon-qrcode btn"></i>
					  </div>
					</form>
				  </div>
				  <div class="modal-footer">
				  <button class="btn btn-warning btn-lg " ng-show="editflag" ng-click="deleteemp(employee)">删除</button>
				  <button class="btn btn-warning btn-lg " ng-show="editflag" ng-click="editempsave(employee)">保存</button>
				  <button class="btn btn-warning btn-lg " ng-show="!editflag" ng-click="addemp(employee)">创建</button>
				  </div>
				</div>
			  </div>
			</div>
			</div>
